name: Build Parvi calendar

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pdfplumber

      - name: Build calendar
        run: python scripts/build_calendar.py

      - name: Commit and push parvi.ics if changed
        run: |
          if git diff --quiet -- parvi.ics; then
            echo "No changes in parvi.ics"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add parvi.ics
          git commit -m "chore: update parvi.ics"
          git push
