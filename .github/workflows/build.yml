name: Build Parvi calendar

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

concurrency:
  group: build-calendars-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pdfplumber

      - name: Build calendar
        run: python scripts/build_calendar.py

      - name: Commit and push calendars if changed
        run: |
          if git diff --quiet -- *.ics; then
            echo "No changes in calendar files"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.ics
          git commit -m "chore: update restaurant calendars"

          # Vältä non-fast-forward virhe, jos remote ehti muuttua ajon aikana.
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
